<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      font-size: 13px;
      color: #2c3e50;
    }
    .hdr {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      padding: 12px 14px;
      font-size: 15px;
      font-weight: 600;
    }
    .body { padding: 12px 14px; }
    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .row:last-of-type { border: none; }
    .lbl  { color: #666; font-weight: 500; }
    .val  { font-weight: 600; }
    .on   { color: #28a745; }
    .off  { color: #dc3545; }
    .dbg  { color: #fd7e14; }
    .btns { display: flex; flex-direction: column; gap: 6px; margin-top: 12px; }
    button {
      width: 100%; padding: 8px;
      border: none; border-radius: 5px;
      font-size: 13px; font-weight: 600; cursor: pointer;
    }
    .btn-open   { background: linear-gradient(135deg,#667eea,#764ba2); color: white; }
    .btn-clear  { background: white; color: #667eea; border: 2px solid #667eea; }
    .info {
      margin-top: 10px; padding: 8px 10px;
      background: #e3f2fd; border-radius: 5px;
      font-size: 11px; color: #1976d2;
    }
  </style>
</head>
<body>
  <div class="hdr">⛳ Tee Time Monitor</div>
  <div class="body">
    <div class="row">
      <span class="lbl">Status</span>
      <span class="val" id="pStatus">—</span>
    </div>
    <div class="row">
      <span class="lbl">Last Check</span>
      <span class="val" id="pLastCheck">—</span>
    </div>
    <div class="row">
      <span class="lbl">Last Status</span>
      <span class="val" id="pLastStatus" style="max-width:160px;text-align:right;font-size:11px">—</span>
    </div>
    <div class="btns">
      <button class="btn-open"  id="btnOpen">Open Golf Site</button>
      <button class="btn-clear" id="btnClear">Clear All Settings</button>
    </div>
    <div class="info">
      The monitor panel appears automatically when you open the golf site.
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
