<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 300px;
      padding: 15px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }
    
    h3 {
      margin: 0 0 15px 0;
      color: #2c3e50;
      font-size: 18px;
    }
    
    .status {
      padding: 10px;
      background: #f8f9fa;
      border-radius: 6px;
      margin-bottom: 15px;
    }
    
    .status-item {
      margin: 5px 0;
      font-size: 14px;
    }
    
    .status-label {
      font-weight: 600;
      color: #6c757d;
    }
    
    .status-value {
      color: #2c3e50;
    }
    
    .active {
      color: #28a745;
      font-weight: 600;
    }
    
    .inactive {
      color: #dc3545;
      font-weight: 600;
    }
    
    .btn {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 8px rgba(102, 126, 234, 0.4);
    }
    
    .btn-secondary {
      background: white;
      color: #667eea;
      border: 2px solid #667eea;
    }
    
    .btn-secondary:hover {
      background: #667eea;
      color: white;
    }
    
    .info {
      margin-top: 15px;
      padding: 10px;
      background: #e3f2fd;
      border-radius: 6px;
      font-size: 12px;
      color: #1976d2;
    }
  </style>
</head>
<body>
  <h3>🏌️ Tee Time Monitor</h3>
  
  <div class="status">
    <div class="status-item">
      <span class="status-label">Status:</span>
      <span id="monitorStatus" class="status-value inactive">Not Active</span>
    </div>
    <div class="status-item">
      <span class="status-label">Last Check:</span>
      <span id="lastCheck" class="status-value">Never</span>
    </div>
  </div>
  
  <button id="openSite" class="btn btn-primary">Open Golf Site</button>
  <button id="clearSettings" class="btn btn-secondary">Clear Settings</button>
  
  <div class="info">
    ℹ️ Navigate to the Westchester County golf site to use the monitor. The control panel will appear automatically.
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
